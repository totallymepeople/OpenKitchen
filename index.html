    <h2>By: Akis</h2>
  </div>
  
<div class="main-layout">

<div id="navigation">
<h2 class="header_2">Ingredients</h2>
	<div class="tip-box">
	<p class="tip">
	<strong>Tip:</strong>Check off the ingredients you have used in the recipe
	</p>
	</div>
    <ul class="checklist">
      <li><label><input type="checkbox">1 onion</label></li>
      <li><label><input type="checkbox">200g chicken</label></li>
      <li><label><input type="checkbox">1/4 bunch parsley</label></li>
      <li><label><input type="checkbox">1 tablespoon olive oil</label></li>
      <li><label><input type="checkbox">400g canned tomatoes</label></li>
      <li><label><input type="checkbox">1/4 teaspoon turmeric</label></li>
      <li><label><input type="checkbox">1/2 teaspoon curry</label></li>
      <li><label><input type="checkbox">salt</label></li>
      <li><label><input type="checkbox">pepper</label></li>
      <li><label><input type="checkbox">2 tablespoons strained yogurt</label></li>
    </ul>
    <h2 class="header_2">To serve</h2>
    <ul class="checklist">
      <li><label><input type="checkbox">200g basmati rice, boiled</label></li>
      <li><label><input type="checkbox">100g strained yogurt</label></li>
      <li><label><input type="checkbox">2 tablespoons parsley, finely chopped</label></li>
    </ul>
  </div>

  <div id="section">
    <h2 class="header_2">Step by step instructions</h2>
	<div class="tip-box">
	<p class="tip">
	<strong>Tip:</strong>While you are cooking, check off the steps you complete and follow the recipe without getting lost.
	</p>
	</div>
    <ol class="checklist">
      <li><label><input type="checkbox">Cut the onion into slices and the cooked chicken into 2 cm cubes. Finely chop the parsley and set it aside.</label></li>
      <li><label><input type="checkbox">Heat the olive oil in a frying pan over medium heat.</label></li>
      <li><label><input type="checkbox">Sauté the chopped onion for 2 minutes, until it softens a little. Add the chicken and mix.</label></li>
      <li><label><input type="checkbox">Add the canned tomatoes, turmeric, curry, salt, and pepper.</label></li>
      <li><label><input type="checkbox">Stir and let it come to a boil.</label></li>
      <li><label><input type="checkbox">Remove from heat, add yogurt and parsley, then mix.</label></li>
      <li><label><input type="checkbox">Check seasoning.</label></li>
      <li><label><input type="checkbox">Serve warm.</label></li>
    </ol>
  </div>
